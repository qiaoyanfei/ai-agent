# 知库 iOS 云端打包（macOS 14 + Xcode 15，可装到 iOS 18 真机）
#
# 签名打包（推荐，可安装到手机）需在 GitHub Secrets 配置：
#   IOS_P12_BASE64          - 开发/发布证书 .p12 的 base64
#   IOS_P12_PASSWORD        - 导出 p12 时的密码
#   IOS_PROFILE_BASE64      - 含本机 UDID 的 .mobileprovision 的 base64
#   APPLE_TEAM_ID           - Apple 团队 ID（10 位）
#   KEYCHAIN_PASSWORD       - 任意强密码（CI 临时钥匙串用）
#
# 未配置签名时：仅产出未签名 .app（需在新 Mac 上用 Xcode 自行签名）
#
# 详细步骤见 docs/IOS_CI.md

name: iOS Build

on:
  workflow_dispatch:
    inputs:
      api_host:
        description: 写入 App 的 API 局域网 IP
        required: false
        default: "192.168.1.8"
  # 可安装 IPA 仅手动触发（需配齐 Secrets），见 ios-compile-check.yml 做 push 编译检查

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require signing secrets (manual run)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          (secrets.IOS_P12_BASE64 == '' || secrets.IOS_P12_PASSWORD == '' ||
           secrets.IOS_PROFILE_BASE64 == '' || secrets.APPLE_TEAM_ID == '' ||
           secrets.KEYCHAIN_PASSWORD == '')
        run: |
          echo "::error::未配置完整的 iOS 签名 Secrets，无法生成可安装 IPA。"
          echo "请按 docs/IOS_CI.md 配置 5 项后重新 Run workflow。"
          exit 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.5"
          cache: true
          cache-key: flutter-3.24.5
          pub-cache-key: mobile-pub

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: CocoaPods install
        working-directory: mobile/ios
        run: pod install

      - name: Import code signing (optional)
        if: ${{ secrets.IOS_P12_BASE64 != '' && secrets.IOS_PROFILE_BASE64 != '' }}
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/build.p12"
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KC="$RUNNER_TEMP/ci.keychain-db"
          echo -n "$IOS_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$IOS_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security import "$CERT_PATH" -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KC"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KC"
          security list-keychain -d user -s "$KC"
          PP_XML=$(security cms -D -i "$PP_PATH")
          PP_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$PP_XML")
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID.mobileprovision"
          echo "PROFILE_UUID=$PP_UUID" >> "$GITHUB_ENV"

      - name: Patch Xcode signing for CI
        if: ${{ secrets.IOS_P12_BASE64 != '' && secrets.IOS_PROFILE_BASE64 != '' && secrets.APPLE_TEAM_ID != '' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        working-directory: mobile/ios
        run: |
          PBX=Runner.xcodeproj/project.pbxproj
          SIGN_BLOCK="DEVELOPMENT_TEAM = ${APPLE_TEAM_ID}; CODE_SIGN_STYLE = Manual; PROVISIONING_PROFILE_SPECIFIER = ${PROFILE_UUID}; CODE_SIGN_IDENTITY = \"Apple Development\";"
          sed -i.bak "s/PRODUCT_BUNDLE_IDENTIFIER = com.aiagent.mindVault;/PRODUCT_BUNDLE_IDENTIFIER = com.aiagent.mindVault; ${SIGN_BLOCK}/" "$PBX"
          /usr/libexec/PlistBuddy -c "Add :teamID string ${APPLE_TEAM_ID}" ExportOptions.plist 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :teamID ${APPLE_TEAM_ID}" ExportOptions.plist

      - name: Build signed IPA
        if: ${{ secrets.IOS_P12_BASE64 != '' && secrets.IOS_PROFILE_BASE64 != '' && secrets.APPLE_TEAM_ID != '' }}
        working-directory: mobile
        env:
          API_HOST: ${{ github.event.inputs.api_host || '192.168.1.8' }}
        run: |
          flutter build ipa --release \
            --dart-define=API_HOST="$API_HOST" \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload signed IPA
        if: ${{ secrets.IOS_P12_BASE64 != '' && secrets.IOS_PROFILE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: zhiku-ios-ipa
          path: mobile/build/ios/ipa/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Summary
        run: |
          echo "### 已构建签名 IPA" >> "$GITHUB_STEP_SUMMARY"
          echo "在 Artifacts 下载 **zhiku-ios-ipa**，用 Apple Configurator 安装到 guomeng 的 iPhone。" >> "$GITHUB_STEP_SUMMARY"
